kind = "web"
previewPath = "/"
title = "MUNNASP NIG. LTD."
version = "1.0.0"
id = "artifacts/munnasp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23073

[services.development]
run = "pnpm --filter @workspace/munnasp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/munnasp", "run", "build" ]
publicDir = "artifacts/munnasp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23073"
BASE_PATH = "/"
